<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRITON — Anomaly Database</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #080909;
    --surface:  #0c0e0d;
    --border:   #1a2218;
    --border2:  #243020;
    --dim:      #2a3828;
    --mid:      #3d5438;
    --text:     #8aab7a;
    --bright:   #b2cc9e;
    --muted:    #3a4e34;
    --warn:     #8a7a3a;
    --err:      #8a3a3a;
    --ok:       #5a9a3a;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    min-height: 100vh;
  }

  .wrap {
    width: 100%;
    max-width: 480px;
  }

  /* header */
  .site-id {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.2em;
    margin-bottom: 0.25rem;
  }

  h1 {
    font-size: 18px;
    color: var(--bright);
    letter-spacing: 0.12em;
    font-weight: normal;
    margin-bottom: 0.15rem;
  }

  .tagline {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.18em;
    margin-bottom: 1.75rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  /* boot log */
  .log {
    margin-bottom: 1.5rem;
    min-height: 52px;
  }

  .log-line {
    font-size: 11px;
    color: var(--muted);
    min-height: 17px;
  }

  .log-line .ok   { color: var(--ok); }
  .log-line .warn { color: var(--warn); }
  .log-line .err  { color: var(--err); }
  .log-line .lit  { color: var(--text); }

  /* form */
  .form-row {
    display: flex;
    align-items: center;
    margin-bottom: 0.9rem;
    gap: 0.75rem;
  }

  label {
    font-size: 11px;
    color: var(--mid);
    width: 110px;
    flex-shrink: 0;
    letter-spacing: 0.08em;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--bright);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 5px 8px;
    outline: none;
    width: 100%;
  }

  input[type="text"]:focus {
    border-color: var(--mid);
  }

  input[type="text"]::placeholder {
    color: var(--border2);
  }

  /* clearance buttons */
  .sc-row {
    display: flex;
    gap: 5px;
    flex: 1;
    flex-wrap: wrap;
  }

  .sc-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 4px 9px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    cursor: pointer;
    letter-spacing: 0.05em;
  }

  .sc-btn:hover { border-color: var(--mid); color: var(--mid); }
  .sc-btn.active { border-color: var(--text); color: var(--text); background: #0f1510; }

  /* submit */
  .submit-btn {
    width: 100%;
    margin-top: 0.5rem;
    padding: 9px;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--mid);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    cursor: pointer;
  }

  .submit-btn:hover:not(:disabled) {
    border-color: var(--text);
    color: var(--bright);
  }

  .submit-btn:disabled {
    opacity: 0.4;
    cursor: default;
  }

  /* status / result */
  .status {
    margin-top: 1rem;
    font-size: 11px;
    color: var(--muted);
    min-height: 18px;
  }

  .status.ok   { color: var(--ok); }
  .status.err  { color: var(--err); }
  .status.warn { color: var(--warn); }

  .result-box {
    margin-top: 1.25rem;
    border: 1px solid var(--border);
    padding: 1rem;
    display: none;
  }

  .result-box.granted { border-color: #2a4a1a; }
  .result-box.denied  { border-color: #3a1a1a; }

  .result-title {
    font-size: 14px;
    letter-spacing: 0.15em;
    margin-bottom: 0.5rem;
  }

  .granted .result-title { color: var(--ok); }
  .denied  .result-title { color: var(--err); }

  .result-detail {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.8;
  }

  .result-detail span { color: var(--text); }

  .enter-link {
    display: inline-block;
    margin-top: 1rem;
    font-size: 11px;
    color: var(--ok);
    text-decoration: none;
    border: 1px solid #2a4a1a;
    padding: 5px 14px;
    letter-spacing: 0.12em;
  }

  .enter-link:hover { background: #0d1a0a; }

  /* blink */
  .blink { animation: bk 1.1s step-end infinite; }
  @keyframes bk { 50% { opacity: 0; } }

  /* footer */
  .footer {
    margin-top: 2rem;
    font-size: 10px;
    color: var(--border2);
    letter-spacing: 0.15em;
    border-top: 1px solid var(--border);
    padding-top: 1rem;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="site-id">TRITON/SCPF/INTERNAL — NODE 4.1</div>
  <h1>TRITON ANOMALY DATABASE</h1>
  <div class="tagline">RESTRICTED ACCESS — AUTHORISED PERSONNEL ONLY</div>

  <div class="log" id="log">
    <div class="log-line" id="l1"></div>
    <div class="log-line" id="l2"></div>
    <div class="log-line" id="l3"></div>
  </div>

  <div id="auth-form">
    <div class="form-row">
      <label>ROBLOX USER</label>
      <input type="text" id="username" placeholder="username" autocomplete="off" spellcheck="false">
    </div>

    <div class="form-row">
      <label>CLEARANCE REQ.</label>
      <div class="sc-row" id="sc-row">
        <button class="sc-btn active" data-rank="3">SC-0</button>
        <button class="sc-btn" data-rank="4">SC-1</button>
        <button class="sc-btn" data-rank="5">SC-2</button>
        <button class="sc-btn" data-rank="6">SC-3</button>
        <button class="sc-btn" data-rank="7">SC-4</button>
        <button class="sc-btn" data-rank="9">SC-5</button>
      </div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="authenticate()">AUTHENTICATE</button>

    <div class="status" id="status"></div>

    <div class="result-box" id="result-box">
      <div class="result-title" id="result-title"></div>
      <div class="result-detail" id="result-detail"></div>
      <a class="enter-link" id="enter-link" href="#" style="display:none">ENTER DATABASE →</a>
    </div>
  </div>

  <div class="footer">
    ALL SESSIONS LOGGED &nbsp;·&nbsp; UNAUTHORISED ACCESS VIOLATES O5 DIRECTIVE 7-Ω<span class="blink">_</span>
  </div>

</div>

<script>
const GROUP_ID = 17194129;

const SC_LABELS = {
  3: 'SC-0', 4: 'SC-1', 5: 'SC-2', 6: 'SC-3', 7: 'SC-4', 9: 'SC-5'
};

// rank >= threshold for clearance
// SC-5 requires rank 9+ (Site Director, Overseer, Administrator)
function rankMeetsClearance(rank, requiredRank) {
  if (requiredRank === 9) return rank >= 9;
  return rank >= requiredRank;
}

// boot log
const bootLines = [
  { id: 'l1', delay: 200,  html: 'SYS &gt; connecting to TRITON node...' },
  { id: 'l1', delay: 900,  html: 'SYS &gt; connecting to TRITON node... <span class="ok">OK</span>' },
  { id: 'l2', delay: 1100, html: 'SYS &gt; verifying group index...' },
  { id: 'l2', delay: 1700, html: 'SYS &gt; verifying group index... <span class="ok">OK</span>' },
  { id: 'l3', delay: 1900, html: 'AUTH &gt; awaiting credentials <span class="blink lit">_</span>' },
];

bootLines.forEach(({ id, delay, html }) => {
  setTimeout(() => { document.getElementById(id).innerHTML = html; }, delay);
});

// clearance selection
document.querySelectorAll('.sc-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sc-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + (cls || '');
}

function showResult(granted, username, role, rank, requestedSC) {
  const box = document.getElementById('result-box');
  const title = document.getElementById('result-title');
  const detail = document.getElementById('result-detail');
  const link = document.getElementById('enter-link');

  box.style.display = 'block';

  if (granted) {
    box.className = 'result-box granted';
    title.textContent = 'ACCESS GRANTED';
    detail.innerHTML =
      `USER &nbsp;&nbsp;&nbsp;: <span>${username}</span><br>` +
      `ROLE &nbsp;&nbsp;&nbsp;: <span>${role}</span><br>` +
      `RANK &nbsp;&nbsp;&nbsp;: <span>${rank}</span><br>` +
      `CLEARED : <span>${requestedSC}</span>`;
    sessionStorage.setItem('triton_rank', rank);
    sessionStorage.setItem('triton_username', username);
    link.style.display = 'inline-block';
    link.href = 'db.html';
  } else {
    box.className = 'result-box denied';
    title.textContent = 'ACCESS DENIED';
    detail.innerHTML =
      `USER &nbsp;&nbsp;&nbsp;: <span>${username}</span><br>` +
      `ROLE &nbsp;&nbsp;&nbsp;: <span>${role || 'NOT IN GROUP'}</span><br>` +
      `RANK &nbsp;&nbsp;&nbsp;: <span>${rank}</span><br>` +
      `REQUIRED: <span>${requestedSC}</span>`;
    link.style.display = 'none';
  }
}

async function authenticate() {
  const username = document.getElementById('username').value.trim();
  const activeBtn = document.querySelector('.sc-btn.active');
  const requiredRank = parseInt(activeBtn.dataset.rank);
  const requestedSC = SC_LABELS[requiredRank];
  const btn = document.getElementById('submit-btn');
  const resultBox = document.getElementById('result-box');

  resultBox.style.display = 'none';

  if (!username) {
    setStatus('> enter a username', 'warn');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'AUTHENTICATING...';
  setStatus('> querying personnel records...', '');
  document.getElementById('l3').innerHTML = 'AUTH &gt; processing <span class="blink lit">_</span>';

  try {
    const res = await fetch(`/api/roblox?username=${encodeURIComponent(username)}&groupId=${GROUP_ID}`);
    const data = await res.json();

    if (data.error) {
      setStatus('> ' + data.error.toLowerCase(), 'err');
      document.getElementById('l3').innerHTML = 'AUTH &gt; lookup failed <span class="err">ERR</span>';
      return;
    }

    const granted = data.inGroup && rankMeetsClearance(data.rank, requiredRank);
    document.getElementById('l3').innerHTML = granted
      ? 'AUTH &gt; identity confirmed <span class="ok">GRANTED</span>'
      : 'AUTH &gt; clearance insufficient <span class="err">DENIED</span>';

    setStatus('');
    showResult(granted, data.username, data.role, data.rank, requestedSC);

  } catch (e) {
    setStatus('> connection error — try again', 'err');
    document.getElementById('l3').innerHTML = 'AUTH &gt; connection error <span class="err">ERR</span>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'AUTHENTICATE';
  }
}

document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') authenticate();
});
</script>
</body>
</html>
